engine: QLever
map_view_url: https://qlever.dev/petrimaps/
query_templates:
  subject_completion: |
    #+ title: Qlue-ls subject completion query.
    #+ description: This query was generated by the SPARQL language server Qlue-ls.
    {% include "prefix_declarations" %}

    PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?qls_entity
           (SAMPLE(?name) AS ?qls_label)
           (GROUP_CONCAT(DISTINCT ?alias; SEPARATOR=", ") AS ?qls_alias)
           (COUNT(*) AS ?qls_count) WHERE {
      {
        SELECT ?qls_entity WHERE {
          ?qls_entity rdfs:label ?name
          FILTER (LANG(?name) = "en")
          FILTER (REGEX(STR(?name),"^{{ search_term }}"))
        }
      }
      UNION {
        SELECT ?qls_entity WHERE {
          ?qls_entity skos:altLabel ?name
          FILTER (LANG(?name) = "en")
          FILTER (REGEX(STR(?name),"^{{ search_term }}"))
        }
      }
      ?qls_entity rdfs:label ?name ;
                      ?p ?o ;
      OPTIONAL {
        ?qls_entity skos:altLabel ?alias
        FILTER (LANG(?alias) = "en")
      }
      FILTER (LANG(?name) = "en")
    }
    GROUP BY ?qls_entity
    ORDER BY DESC(?qls_count)
    LIMIT {{ limit }} OFFSET {{ offset }}
  predicate_completion_context_sensitive: |-
    # predicate completion sensitive
    {% for prefix in prefixes %}
    PREFIX {{prefix.0}}: <{{prefix.1}}>
    {% endfor %}
    {% if subject is not variable %}
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?qls_entity
             (SAMPLE(?name) as ?qls_label)
             (SAMPLE(?count) as ?qls_count) WHERE {
        {
          SELECT ?qls_entity (COUNT(?qls_entity) AS ?count) WHERE {
            {{ local_context }}
          }
          GROUP BY ?qls_entity
        }
        {% if not search_term %}
          ?qui_tmp_1 ?qui_tmp_2 ?qls_entity .
          ?qui_tmp_1 rdfs:label ?name . FILTER (LANG(?name) = "en")
        BIND (?name AS ?alias)
        {% elif search_term_uncompressed %}
          ?qui_tmp_1 ?qui_tmp_2 ?qls_entity .
          ?qui_tmp_1 rdfs:label ?name FILTER (LANG(?name) = "en")
        FILTER REGEX(STR(?qls_entity), "{{ search_term_uncompressed }}", "i")
        {% else %}
          ?qui_tmp_1 ?qui_tmp_2 ?qls_entity .
          ?qui_tmp_1 rdfs:label ?name FILTER (LANG(?name) = "en")
          OPTIONAL {
            ?qui_tmp_1 skos:altLabel ?alias FILTER (LANG(?alias) = "en")
          }
          FILTER (REGEX(STR(?name), "{{ search_term }}", "i") || REGEX(STR(?alias), "{{ search_term }}", "i"))
        {% endif %}
      }
      GROUP BY ?qls_entity
      ORDER BY DESC(?qls_count)
    {% else %}
      PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      SELECT ?qls_entity
             (SAMPLE(?name) as ?qls_label)
             (SAMPLE(?count) as ?qls_count) WHERE {
        {% if not context %}
          {
            SELECT ?qls_entity (COUNT(?qls_entity) AS ?count) WHERE {
              {{ local_context }}
            }
            GROUP BY ?qls_entity
          }
        {% else %}
          {
            SELECT ?qls_entity (COUNT(DISTINCT {{ subject }}) AS ?count) WHERE {
             {{ context }} {{ local_context }}
            }
            GROUP BY ?qls_entity
          }
        {% endif %}
        {% if not search_term %}
          ?qui_tmp_1 ?qui_tmp_2 ?qls_entity .
          ?qui_tmp_1 rdfs:label ?name FILTER (LANG(?name) = "en")
          BIND (?name AS ?alias)
        {% elif search_term_uncompressed %}
          ?qui_tmp_1 ?qui_tmp_2 ?qls_entity .
          ?qui_tmp_1 rdfs:label ?name FILTER (LANG(?name) = "en")
          FILTER REGEX(STR(?qls_entity), "{{ search_term_uncompressed }}", "i")
        {% else %}
        ?qui_tmp_1 ?qui_tmp_2 ?qls_entity .
        ?qui_tmp_1 rdfs:label ?name FILTER (LANG(?name) = "en")
        OPTIONAL {
          ?qui_tmp_1 skos:altLabel ?alias FILTER (LANG(?alias) = "en")
        }
        FILTER (REGEX(STR(?name), "{{ search_term }}", "i") || REGEX(STR(?alias), "{{ search_term }}", "i"))
        {% endif %}
      }
      GROUP BY ?qls_entity
      ORDER BY DESC(?qls_count)
    {% endif %}
    LIMIT {{ limit }} OFFSET {{ offset }}
  predicate_completion_context_insensitive: |-
    {% include "prefix_declarations" %}
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?qls_entity ?qls_label ?qls_alias ?qls_count WHERE {
      {
        SELECT ?qls_entity (COUNT(*) AS ?qls_count) WHERE {
          {{ local_context }}
        }
        GROUP BY ?qls_entity
        ORDER BY DESC(?qls_count)
        LIMIT {{ limit }}
      }
      OPTIONAL { ?qls_entity rdfs:label ?qls_label }
      OPTIONAL { ?qls_entity rdfs:comment ?qls_alias }
    }
  object_completion_context_sensitive: |-
    #+ title: Qlue-ls object sensitive completion query.
    #+ description: This query was generated by the SPARQL language server Qlue-ls.
    {% include "prefix_declarations" %}
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?qls_entity ?qls_label ?qls_alias ?qls_count WHERE {
      {
        SELECT ?qls_entity (COUNT(*) AS ?qls_count) WHERE {
          {{ context }} {{ local_context }}
        }
        GROUP BY ?qls_entity
        ORDER BY DESC(?qls_count)
        LIMIT {{ limit }}
      }
      OPTIONAL { ?qls_entity rdfs:label ?qls_label }
      OPTIONAL { ?qls_entity rdfs:comment ?qls_alias }
      {% if search_term %}
      FILTER(CONTAINS(LCASE(STR(?qls_label)), LCASE("{{ search_term }}")) || CONTAINS(LCASE(STR(?qls_alias)), LCASE("{{ search_term }}")))
      {% endif %}
    }
  object_completion_context_insensitive: |-
    {% include "prefix_declarations" %}
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?qls_entity ?qls_label ?qls_alias ?qls_count WHERE {
      {
        SELECT ?qls_entity (COUNT(*) AS ?qls_count) WHERE {
          {{ local_context }}
        }
        GROUP BY ?qls_entity
        ORDER BY DESC(?qls_count)
        LIMIT {{ limit }}
      }
      OPTIONAL { ?qls_entity rdfs:label ?qls_label }
      OPTIONAL { ?qls_entity rdfs:comment ?qls_alias }
      {% if search_term %}
      FILTER(CONTAINS(LCASE(STR(?qls_label)), LCASE("{{ search_term }}")) || CONTAINS(LCASE(STR(?qls_alias)), LCASE("{{ search_term }}")))
      {% endif %}
    }
  values_completion_context_sensitive: |-
    {% include "prefix_declarations" %}
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?qls_entity ?qls_label ?qls_alias WHERE {
      {{ context }} {{ local_context }}
      OPTIONAL { ?qls_entity rdfs:label ?qls_label }
      OPTIONAL { ?qls_entity rdfs:comment ?qls_alias }
      {% if search_term %}
      FILTER(CONTAINS(LCASE(STR(?qls_label)), LCASE("{{ search_term }}")) || CONTAINS(LCASE(STR(?qls_entity)), LCASE("{{ search_term }}")))
      {% endif %}
    }
    LIMIT {{ limit }}
  values_completion_context_insensitive: |-
    {% include "prefix_declarations" %}
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?qls_entity ?qls_label ?qls_alias WHERE {
      {{ local_context }}
      OPTIONAL { ?qls_entity rdfs:label ?qls_label }
      OPTIONAL { ?qls_entity rdfs:comment ?qls_alias }
      {% if search_term %}
      FILTER(CONTAINS(LCASE(STR(?qls_label)), LCASE("{{ search_term }}")) || CONTAINS(LCASE(STR(?qls_entity)), LCASE("{{ search_term }}")))
      {% endif %}
    }
    LIMIT {{ limit }}
  hover: |-
    {% include "prefix_declarations" %}
    PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
    SELECT ?qls_label ?qls_alias WHERE {
      {{ entity }} rdfs:label ?qls_label .
      OPTIONAL { {{ entity }} rdfs:comment ?qls_alias }
    }
    LIMIT 1
